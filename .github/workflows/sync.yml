# Bidirectional sync: Lark department ↔ GitHub org, repos → Lark group chats
name: "Sync GitHub \u2194 Lark"

on:
  schedule:
    # Run daily at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no changes applied)"
        required: false
        type: boolean
        default: false
      skip_members:
        description: "Skip member sync"
        required: false
        type: boolean
        default: false
      skip_repos:
        description: "Skip repo sync"
        required: false
        type: boolean
        default: false

permissions:
  contents: write    # To commit updated mapping file
  actions: write     # To set repo variables

env:
  LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
  LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
  LARK_DOMAIN: ${{ vars.LARK_DOMAIN || 'feishu' }}
  LARK_SOURCE_DEPARTMENT_ID: ${{ vars.LARK_SOURCE_DEPARTMENT_ID || '0' }}
  LARK_ADMIN_CHAT_ID: ${{ vars.LARK_ADMIN_CHAT_ID }}
  LARK_ADMIN_OPEN_ID: ${{ vars.LARK_ADMIN_OPEN_ID }}
  GITHUB_TOKEN: ${{ secrets.SYNC_GITHUB_TOKEN }}
  GITHUB_ORG: ${{ vars.SYNC_GITHUB_ORG }}
  DRY_RUN: ${{ inputs.dry_run || 'false' }}

jobs:
  sync-members:
    name: Sync Members
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_members }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync Lark department ↔ GitHub org members
        run: npx tsx src/sync-members.ts

      - name: Commit updated mapping
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/user-mapping.json
          git diff --staged --quiet || git commit -m "chore: sync members [skip ci]"
          git push

  sync-repos:
    name: Sync Repos
    runs-on: ubuntu-latest
    # Run after members so newly-matched users land in their repo chats on
    # the same day, not 24h later.
    needs: sync-members
    if: ${{ !inputs.skip_repos && (success() || needs.sync-members.result == 'skipped') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync GitHub repos to Lark group chats
        run: npx tsx src/sync-repos.ts

      - name: Commit updated mapping
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/repo-chat-mapping.json
          git diff --staged --quiet || git commit -m "chore: update repo-chat mapping [skip ci]"
          git push
