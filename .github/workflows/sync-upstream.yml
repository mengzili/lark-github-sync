# Automatically pull updates from the upstream template repo.
# Runs weekly and creates a PR if there are new changes.
name: "\U0001F504 Sync from upstream"

on:
  schedule:
    - cron: "0 3 * * 1"   # Every Monday at 03:00 UTC
  workflow_dispatch:        # Or trigger manually

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/mengzili/lark-github-sync.git 2>/dev/null || true
          git fetch upstream main

      - name: Check for upstream changes
        id: check
        run: |
          BEHIND=$(git rev-list HEAD..upstream/main --count)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          if [ "$BEHIND" -eq 0 ]; then
            echo "Already up to date with upstream."
          else
            echo "$BEHIND new commit(s) from upstream."
          fi

      - name: Create update branch and merge
        if: steps.check.outputs.behind != '0'
        run: |
          BRANCH="auto/sync-upstream-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git merge upstream/main --no-edit || true

          # If there are conflicts, commit them as-is so the PR shows what needs resolving
          if [ -n "$(git ls-files -u)" ]; then
            git add -A
            git commit -m "chore: merge upstream (has conflicts to resolve manually)"
          fi

          git push origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Create pull request
        if: steps.check.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.SYNC_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          BEHIND=${{ steps.check.outputs.behind }}
          gh pr create \
            --title "Sync upstream: $BEHIND new commit(s) from lark-github-sync" \
            --body "$(cat <<'EOF'
          ## Upstream updates

          This PR merges **${{ steps.check.outputs.behind }}** new commit(s) from [mengzili/lark-github-sync](https://github.com/mengzili/lark-github-sync).

          **Review the changes**, then merge. If there are conflicts, resolve them before merging.

          <details>
          <summary>What changed upstream</summary>

          $(git log HEAD..upstream/main --oneline)

          </details>

          ---
          *Auto-generated by the sync-upstream workflow.*
          EOF
          )" \
            --head "$BRANCH" \
            --base main
