# Automatically pull updates from the upstream template repo.
# Runs weekly and creates a PR if there are new changes.
name: "\U0001F504 Sync from upstream"

on:
  schedule:
    - cron: "0 3 * * 1"   # Every Monday at 03:00 UTC
  workflow_dispatch:        # Or trigger manually

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/mengzili/lark-github-sync.git 2>/dev/null || true
          git fetch upstream main

      - name: Check for upstream changes
        id: check
        run: |
          BEHIND=$(git rev-list HEAD..upstream/main --count)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          if [ "$BEHIND" -eq 0 ]; then
            echo "Already up to date with upstream."
          else
            echo "$BEHIND new commit(s) from upstream."
          fi

      - name: Create update branch and merge
        if: steps.check.outputs.behind != '0'
        run: |
          BRANCH="auto/sync-upstream-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          # Save runtime data files before the merge — they're specific to this
          # fork (Lark chat mappings, approval state) and should NEVER be
          # overwritten by upstream's seed versions.
          mkdir -p /tmp/lgs-data-backup
          cp -r data/. /tmp/lgs-data-backup/ 2>/dev/null || true

          # Prefer upstream on conflicts. For a template-generated repo this
          # is nearly always "add/add" conflicts where upstream's version is
          # what the user actually wants.
          git merge upstream/main --no-edit --allow-unrelated-histories -X theirs || true

          # Restore the fork's data/ files regardless of what merge did.
          cp -r /tmp/lgs-data-backup/. data/ 2>/dev/null || true
          git add data/

          # If there are still unresolved conflicts, commit as-is so the PR
          # surfaces them. Otherwise the merge's own commit is what we push.
          if [ -n "$(git ls-files -u)" ]; then
            git add -A
            git commit -m "chore: merge upstream (some conflicts remain — resolve manually)"
          elif ! git diff --quiet HEAD; then
            git commit -m "chore: restore runtime data after upstream sync"
          fi

          git push origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Create pull request
        if: steps.check.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.SYNC_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          # If the merge produced nothing new beyond main, there's no PR to open.
          # This happens when upstream's changes are all no-ops for this fork
          # (e.g. only touched data/ files which the fork keeps).
          AHEAD=$(git rev-list origin/main..HEAD --count)
          if [ "$AHEAD" -eq 0 ]; then
            echo "No new commits on $BRANCH after merge — nothing to PR."
            exit 0
          fi

          BEHIND=${{ steps.check.outputs.behind }}

          # Use the REST API directly. `gh pr create --head` gets confused by
          # the `upstream` remote we added earlier in this job — it picks the
          # wrong head-repo and the GraphQL mutation comes back blank
          # ("Head sha can't be blank, Head ref must be a branch"). The REST
          # call below addresses repos/{org}/{repo}/pulls explicitly so there
          # is no ambiguity.
          BODY=$(cat <<EOF
          ## Upstream updates

          This PR merges **$BEHIND** new commit(s) from [mengzili/lark-github-sync](https://github.com/mengzili/lark-github-sync).

          **Review the changes**, then merge. If there are conflicts, resolve them before merging.

          ---
          *Auto-generated by the sync-upstream workflow.*
          EOF
          )

          for i in 1 2 3 4 5; do
            if gh api -X POST "repos/${{ github.repository }}/pulls" \
                -f title="Sync upstream: $BEHIND new commit(s) from lark-github-sync" \
                -f body="$BODY" \
                -f head="$BRANCH" \
                -f base=main; then
              exit 0
            fi
            echo "PR create attempt $i failed — retrying in $((i * 3))s"
            sleep $((i * 3))
          done
          exit 1
