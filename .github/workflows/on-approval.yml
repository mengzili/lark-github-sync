# Apply a single member-match approval dispatched from docs/approve.html.
#
# Triggered by the approve page via POST /repos/{org}/{sync_repo}/dispatches
# with event_type=approval-applied and the decision in client_payload.
name: "Apply Approval"

on:
  repository_dispatch:
    types: [approval-applied]

permissions:
  contents: write

# Serialize so concurrent clicks don't race on data/user-mapping.json
concurrency:
  group: user-mapping-write
  cancel-in-progress: false

env:
  LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
  LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
  LARK_DOMAIN: ${{ vars.LARK_DOMAIN || 'feishu' }}
  LARK_SOURCE_DEPARTMENT_ID: ${{ vars.LARK_SOURCE_DEPARTMENT_ID || '0' }}
  GITHUB_TOKEN: ${{ secrets.SYNC_GITHUB_TOKEN }}
  GITHUB_ORG: ${{ vars.SYNC_GITHUB_ORG }}

jobs:
  apply:
    name: Apply approval decision
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Apply decision and commit (with retry on concurrent push)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3 4 5; do
            # Refresh state — a sibling approval run may have pushed while we queued
            git fetch origin main
            git reset --hard origin/main

            # Apply this run's decision on top of the freshest state
            npx tsx src/apply-approval.ts

            git add data/user-mapping.json
            if git diff --staged --quiet; then
              echo "No changes (already applied or entry no longer pending)"
              exit 0
            fi
            git commit -m "chore: apply approval for ${{ github.event.client_payload.github_login }} [skip ci]"

            if git push; then
              echo "Pushed successfully on attempt $attempt"
              exit 0
            fi

            echo "Push attempt $attempt rejected — another run got there first; retrying..."
            sleep $((attempt * 2))
          done
          echo "All 5 attempts exhausted"
          exit 1
