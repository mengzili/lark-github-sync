# Apply a single member-match approval dispatched from docs/approve.html.
#
# Triggered by the approve page via POST /repos/{org}/{sync_repo}/dispatches
# with event_type=approval-applied and the decision in client_payload.
name: "Apply Approval"

on:
  repository_dispatch:
    types: [approval-applied]

permissions:
  contents: write

# Serialize so concurrent clicks don't race on data/user-mapping.json
concurrency:
  group: user-mapping-write
  cancel-in-progress: false

env:
  LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
  LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
  LARK_DOMAIN: ${{ vars.LARK_DOMAIN || 'feishu' }}
  LARK_SOURCE_DEPARTMENT_ID: ${{ vars.LARK_SOURCE_DEPARTMENT_ID || '0' }}
  GITHUB_TOKEN: ${{ secrets.SYNC_GITHUB_TOKEN }}
  GITHUB_ORG: ${{ vars.SYNC_GITHUB_ORG }}

jobs:
  apply:
    name: Apply approval decision
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Apply decision
        run: npx tsx src/apply-approval.ts

      - name: Commit updated mapping
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/user-mapping.json
          git diff --staged --quiet || git commit -m "chore: apply approval for ${{ github.event.client_payload.github_login }} [skip ci]"
          git push
