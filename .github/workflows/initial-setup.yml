# One-shot setup — run this once after creating the repo from the template.
# Configures org-level secrets/variables, registers the GitHub org webhook with
# the central Worker, creates the Lark admin chat, runs the first sync, and
# deploys notification workflows to every repo. No CLI or local install needed.
name: "\U0001F680 Initial Setup"

on:
  workflow_dispatch:
    inputs:
      github_org:
        description: "Your GitHub organization name"
        required: true
        type: string
      lark_domain:
        description: "Lark platform"
        required: true
        type: choice
        options:
          - "feishu"
          - "lark"
        default: "feishu"
      lark_department_id:
        description: "Lark department ID to sync (0 = all employees)"
        required: false
        type: string
        default: "0"
      admin_email:
        description: "Lark email of the admin who will receive approval cards"
        required: true
        type: string
      worker_base_url:
        description: "Central Worker base URL (leave default unless self-hosted)"
        required: false
        type: string
        default: "https://feishu-github-sync-oauth.workers.dev"

permissions:
  contents: write
  actions: write

env:
  LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
  LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
  GITHUB_TOKEN: ${{ secrets.SYNC_GITHUB_TOKEN }}
  GITHUB_ORG: ${{ inputs.github_org }}
  LARK_DOMAIN: ${{ inputs.lark_domain }}
  LARK_SOURCE_DEPARTMENT_ID: ${{ inputs.lark_department_id }}
  ADMIN_EMAIL: ${{ inputs.admin_email }}
  WORKER_BASE_URL: ${{ inputs.worker_base_url }}

jobs:
  # ── 1. Validate credentials and propagate config to org level ──────────
  configure:
    name: "Configure org secrets & variables"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate inputs
        run: |
          if [ -z "$LARK_APP_ID" ] || [ -z "$LARK_APP_SECRET" ]; then
            echo "::error::LARK_APP_ID and LARK_APP_SECRET must be set in repo Settings → Secrets."
            exit 1
          fi
          if [ -z "${{ secrets.SYNC_GITHUB_TOKEN }}" ]; then
            echo "::error::SYNC_GITHUB_TOKEN must be set in repo Settings → Secrets."
            exit 1
          fi
          if [ -z "$ADMIN_EMAIL" ]; then
            echo "::error::admin_email input is required."
            exit 1
          fi
          echo "All required secrets are present."

      - name: Promote secrets to org level
        env:
          GH_TOKEN: ${{ secrets.SYNC_GITHUB_TOKEN }}
        run: |
          ORG="${{ inputs.github_org }}"
          echo "Setting org-level secrets for $ORG ..."
          gh secret set LARK_APP_ID       --org "$ORG" --visibility all --body "$LARK_APP_ID"                              && echo "  ✓ LARK_APP_ID"
          gh secret set LARK_APP_SECRET   --org "$ORG" --visibility all --body "$LARK_APP_SECRET"                          && echo "  ✓ LARK_APP_SECRET"
          gh secret set SYNC_GITHUB_TOKEN --org "$ORG" --visibility all --body "${{ secrets.SYNC_GITHUB_TOKEN }}"           && echo "  ✓ SYNC_GITHUB_TOKEN"

      - name: Set org-level variables
        env:
          GH_TOKEN: ${{ secrets.SYNC_GITHUB_TOKEN }}
        run: |
          ORG="${{ inputs.github_org }}"
          echo "Setting org-level variables for $ORG ..."
          gh variable set GITHUB_ORG                --org "$ORG" --visibility all --body "$ORG"                                 && echo "  ✓ GITHUB_ORG = $ORG"
          gh variable set LARK_DOMAIN               --org "$ORG" --visibility all --body "${{ inputs.lark_domain }}"            && echo "  ✓ LARK_DOMAIN = ${{ inputs.lark_domain }}"
          gh variable set LARK_SOURCE_DEPARTMENT_ID --org "$ORG" --visibility all --body "${{ inputs.lark_department_id }}"     && echo "  ✓ LARK_SOURCE_DEPARTMENT_ID = ${{ inputs.lark_department_id }}"

  # ── 2. Admin chat + webhook + tenant registration ─────────────────────
  bootstrap:
    name: "Admin chat, webhook, tenant registration"
    needs: configure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Bootstrap admin chat + webhook + tenant
        run: npx tsx src/setup-bootstrap.ts

  # ── 3. Sync members (Lark department ↔ GitHub org) ────────────────────
  sync-members:
    name: "Sync members"
    needs: bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Two-way sync Lark department ↔ GitHub org members
        env:
          LARK_ADMIN_CHAT_ID: ${{ vars.LARK_ADMIN_CHAT_ID }}
        run: npx tsx src/sync-members.ts
      - name: Commit updated mapping
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/user-mapping.json
          git diff --staged --quiet || git commit -m "chore: initial member sync [skip ci]"
          git push

  # ── 4. Sync repos (create Lark group chats) ───────────────────────────
  sync-repos:
    name: "Sync repos → Lark chats"
    needs: bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Create Lark group chats for repos
        run: npx tsx src/sync-repos.ts
      - name: Commit mapping
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/repo-chat-mapping.json
          git diff --staged --quiet || git commit -m "chore: update repo-chat mapping [skip ci]"
          git push

  # ── 5. Deploy notification workflows to every org repo ─────────────────
  deploy-notifications:
    name: "Deploy notification workflows"
    needs: [sync-repos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Push lark-notify.yml to all org repos
        run: npx tsx src/setup-repos.ts
